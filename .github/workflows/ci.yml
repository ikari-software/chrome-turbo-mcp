name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  go:
    name: go test + vet + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...

  extension:
    name: extension (vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - run: npm test -- --run
      - run: node build.js
